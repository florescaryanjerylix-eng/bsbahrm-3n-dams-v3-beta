<script>
// --- CORE VARIABLE STATE ---
let profiles = JSON.parse(localStorage.getItem('dams_profiles') || '[]');
let subjects = JSON.parse(localStorage.getItem('dams_subjects') || '[]');
let subjectMeta = JSON.parse(localStorage.getItem('dams_subject_meta') || '{}');
let records = JSON.parse(localStorage.getItem('dams_records') || '[]');
let finalized = JSON.parse(localStorage.getItem('dams_finalized') || '{}');
let cloudUrl = localStorage.getItem('dams_sheets_url') || '';

// --- NEW CLOUD SYNC LOGIC (Added) ---
async function syncDropdownsFromCloud() {
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzeSmRxQluoua-e_ofi2tSG4R9iT-yOYcwQ4fZW9Dqy_RSaJkz1OsFu73BTnum71cz1/exec";
    try {
        const response = await fetch(CLOUD_URL);
        const data = await response.json();
        const subSelects = ['subject-select', 'records-subject-select', 'analytics-subject-select', 'csv-subject-select', 'settings-subject-select'];
        
        let subOptions = data.slice(1).map(r => r[0]).filter(Boolean).map(s => `<option value="${s}">${s}</option>`).join('');
        subSelects.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = subOptions; });
        
        // Populate Officers (assuming Col B)
        const officerSelect = document.getElementById('officer-select');
        let offOptions = data.slice(1).map(r => r[1]).filter(Boolean).map(o => `<option value="${o}">${o}</option>`).join('');
        if(officerSelect) officerSelect.innerHTML = `<option value="">Select Monitoring Officer</option>` + offOptions;
        
    } catch (e) {
        console.log("Cloud sync skipped, using local storage");
    }
}

// --- YOUR ORIGINAL FUNCTIONS (Paste everything you had before starting here) ---
// (e.g., toggleTheme, initTheme, switchView, toast, verifyConnectivity, saveSubject, etc.)

// --- INITIALIZATION ---
// Replace your old "rebuildDropdowns()" call with this new sync call:
window.onload = () => {
    initTheme();
    syncDropdownsFromCloud(); // <--- This pulls from cloud
    setupScannerHardware();
    verifyConnectivity();
    autoTrackSubjectSettings();
};

</script>
