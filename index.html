<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMS v3.1.5 Beta</title>
    <style>
        /* Keep all your existing CSS here */
        body { font-family: sans-serif; padding: 20px; background: #faf7f2; }
        .logo { font-weight: bold; font-size: 24px; color: #7A0C2E; }
        select, input, button { width: 100%; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="logo">Dv3.5</div>
    <h1>DAMS v3.1.5 Beta</h1>
    <div id="status">Syncing settings from cloud...</div>

    <!-- Dropdowns remain exactly as they were -->
    <select id="subject-select"><option>Loading Subjects...</option></select>
    <select id="officer-select"><option>Loading Officers...</option></select>
    
    <input type="text" id="student-id" placeholder="Scan or Enter Student ID">
    <button onclick="recordAttendance()">Submit Attendance</button>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzeSmRxQluoua-e_ofi2tSG4R9iT-yOYcwQ4fZW9Dqy_RSaJkz1OsFu73BTnum71cz1/exec";

        // This replaces your localStorage initialization
        async function initCloudApp() {
            const status = document.getElementById('status');
            try {
                const response = await fetch(CLOUD_URL);
                const data = await response.json();
                
                const subSelect = document.getElementById('subject-select');
                const offSelect = document.getElementById('officer-select');
                
                subSelect.innerHTML = '<option value="">Select Subject</option>';
                offSelect.innerHTML = '<option value="">Select Officer</option>';

                // data.slice(1) skips the header row
                data.slice(1).forEach(row => {
                    if(row[0]) subSelect.innerHTML += `<option value="${row[0]}">${row[0]}</option>`;
                    if(row[1]) offSelect.innerHTML += `<option value="${row[1]}">${row[1]}</option>`;
                });
                
                status.textContent = "Cloud Synchronized";
            } catch (err) {
                status.textContent = "Error: Could not connect to cloud.";
                console.error(err);
            }
        }

        async function recordAttendance() {
            const payload = {
                studentId: document.getElementById('student-id').value,
                name: "Student", 
                subject: document.getElementById('subject-select').value,
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString(),
                officer: document.getElementById('officer-select').value,
                status: "Present"
            };

            await fetch(CLOUD_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            alert("Attendance Recorded!");
            document.getElementById('student-id').value = "";
        }

        window.onload = initCloudApp;
    </script>
</body>
</html>
