<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DAMS V3.3.0 — Digital Attendance Monitoring System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root, [data-theme="light"] { --maroon: #7A0C2E; --maroon-dark: #560820; --gold: #F4B41A; --gold-soft: #FBE3A5; --bg: #FAF7F2; --card: #FFFFFF; --ink: #241014; --muted: #8A7A80; --line: #EAE0DE; --ok: #2E7D4F; --warn: #C77700; --danger: #B3261E; --radius: 14px; }
  [data-theme="dark"] { --maroon: #A9264E; --maroon-dark: #20020A; --gold: #F5BC32; --gold-soft: #3D2D0A; --bg: #140D0F; --card: #1F1517; --ink: #F7EAEF; --muted: #A69096; --line: #332226; --ok: #42A96D; --warn: #EAA023; --danger: #E2534C; }
  *{box-sizing:border-box; margin:0; padding:0; transition: background 0.2s, border-color 0.2s;}
  body{ font-family: 'Segoe UI', Inter, sans-serif; background: var(--bg); color: var(--ink); max-width: 480px; margin: 0 auto; min-height: 100vh; display:flex; flex-direction:column; }
  header{ background: var(--maroon-dark); color: white; padding: 18px 20px 22px; border-bottom: 2px solid var(--gold); }
  .brand-row{ display:flex; justify-content:space-between; align-items:center; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:38px; height:38px; border:2.5px solid var(--gold); border-radius:9px; display:flex; align-items:center; justify-content:center; font-family: Georgia, serif; font-weight:700; font-size:15px; color: var(--gold); }
  .status-strip{ margin-top:14px; display:flex; justify-content:space-between; font-size:12px; background: rgba(255,255,255,0.06); padding: 9px 12px; border-radius:10px; }
  .status-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; background: var(--warn); }
  .status-dot.online{ background: var(--ok); }
  main{ flex:1; padding: 18px 16px 90px; }
  .view{ display:none; } .view.active{ display:block; }
  .section-label{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color: var(--muted); font-weight:600; margin: 4px 0 10px; }
  .card{ background: var(--card); border:1px solid var(--line); border-radius: var(--radius); padding:16px; margin-bottom:14px; }
  select, input{ width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line); margin-bottom:10px; background:var(--card); color: var(--ink); }
  .btn{ border:none; border-radius:10px; padding:11px 16px; font-weight:600; cursor:pointer; width:100%; }
  .btn-primary{ background: var(--maroon); color:white; }
  .nav-btn{ flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; color: var(--muted); cursor:pointer; }
  .nav-btn.active{ color: var(--maroon); }
  nav{ position:fixed; bottom:0; width:100%; max-width:480px; background:var(--card); display:flex; padding: 10px; border-top:1px solid var(--line); z-index:90; }
  .toast{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#241014; color:white; padding:10px 20px; border-radius:10px; opacity:0; transition:0.3s; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <div class="brand"><div class="brand-mark">D</div><div><h1>DAMS V3.3.0</h1></div></div>
  </div>
  <div class="status-strip">
    <span><span class="status-dot" id="conn-dot"></span><span id="conn-text">Checking...</span></span>
  </div>
</header>

<main>
  <div class="view active" id="view-scan">
    <div class="section-label">Active Track</div>
    <select id="subject-select"></select>
    <div class="section-label">Officer</div>
    <select id="officer-select"></select>
    <div style="aspect-ratio:1/1; background:#111; border-radius:14px; margin-bottom:14px;" id="qr-reader"></div>
    <input type="text" id="manual-input" placeholder="Manual ID Entry">
    <button class="btn btn-primary" onclick="manualRecord()">Enter Record</button>
  </div>
</main>

<nav>
  <button class="nav-btn active" onclick="switchView('scan')"><span>Scan</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
let cloudUrl = "https://script.google.com/macros/s/AKfycbzeSmRxQluoua-e_ofi2tSG4R9iT-yOYcwQ4fZW9Dqy_RSaJkz1OsFu73BTnum71cz1/exec";

// Sync settings from Google Sheet
async function loadCloudSettings() {
    try {
        const response = await fetch(cloudUrl);
        const data = await response.json(); 
        const subjects = data.slice(1).map(r => r[0]).filter(Boolean);
        document.getElementById('subject-select').innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
        const officers = data.slice(1).map(r => r[1]).filter(Boolean);
        document.getElementById('officer-select').innerHTML = officers.map(o => `<option value="${o}">${o}</option>`).join('');
    } catch (e) { console.warn("Cloud settings load failed"); }
}

// Log attendance to Google Sheet
function sendSingleScanToCloud(payload) {
    fetch(cloudUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(() => toast("Sync Success"));
}

function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 2000);
}

function manualRecord(){
    const id = document.getElementById('manual-input').value;
    const payload = { studentId: id, subject: document.getElementById('subject-select').value, time: new Date().toLocaleTimeString() };
    sendSingleScanToCloud(payload);
}

function switchView(v){ /* Logic for view switching */ }

// Initialize[cite: 1]
window.onload = () => {
    loadCloudSettings();
    document.getElementById('conn-dot').className = 'status-dot online';
    document.getElementById('conn-text').textContent = 'Online';
};
</script>
</body>
</html>
